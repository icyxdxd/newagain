<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Epic Landscape Gallery</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="gallery.css">
    <script src="gallery.js"></script>
</head>

<body onload="initializeGallery()">

    <header>
        <h1>Epic Landscape Gallery</h1>
        <p>Hover or use your keyboard to explore the landscapes</p>
    </header>

    <main>
        <div id="image">
            Hover over or focus on an image below to display here.
        </div>

        <div class="gallery">

            <figure>
                <img class="preview"
                    src="https://images.unsplash.com/photo-1501785888041-af3ef285b470"
                    alt="Snow-covered mountains under a dramatic sunset sky"
                    onmouseover="upDate(this)"
                    onmouseleave="unDo()"
                    onfocus="upDate(this)"
                    onblur="unDo()">
            </figure>

            <figure>
                <img class="preview"
                    src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee"
                    alt="Tropical beach with turquoise water and white sand"
                    onmouseover="upDate(this)"
                    onmouseleave="unDo()"
                    onfocus="upDate(this)"
                    onblur="unDo()">
            </figure>

            <figure>
                <img class="preview"
                    src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e"
                    alt="Dense green forest with sunlight shining through trees"
                    onmouseover="upDate(this)"
                    onmouseleave="unDo()"
                    onfocus="upDate(this)"
                    onblur="unDo()">
            </figure>

            <figure>
                <img class="preview"
                    src="https://images.unsplash.com/photo-1470770841072-f978cf4d019e"
                    alt="Desert dunes with soft golden curves at sunrise"
                    onmouseover="upDate(this)"
                    onmouseleave="unDo()"
                    onfocus="upDate(this)"
                    onblur="unDo()">
            </figure>

            <figure>
                <img class="preview"
                    src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e"
                    alt="Ocean waves crashing against rocky cliffs"
                    onmouseover="upDate(this)"
                    onmouseleave="unDo()"
                    onfocus="upDate(this)"
                    onblur="unDo()">
            </figure>

            <figure>
                <img class="preview"
                    src="https://images.unsplash.com/photo-1493244040629-496f6d136cc3"
                    alt="Calm lake reflecting colorful autumn trees"
                    onmouseover="upDate(this)"
                    onmouseleave="unDo()"
                    onfocus="upDate(this)"
                    onblur="unDo()">
            </figure>

        </div>
    </main>

    <footer>
        <p>Accessible Interactive Photo Gallery</p>
    </footer>

</body>
</html>
